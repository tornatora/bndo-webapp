[build]
  command = "npm run build:app"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  CHAT_BACKEND_PROXY_MODE = "on"
  CHAT_PROXY_BASE_URL = "https://69ce95a19126a43a447cb472--cheerful-cobbler-f23efc.netlify.app"
  CHAT_PROXY_TIMEOUT_MS = "30000"

[functions]
  directory = "netlify/functions"

[functions.refresh-bandi]
  schedule = "0 3 * * *"

[functions.refresh-bandi-incremental]
  schedule = "0 15 * * *"

[functions.scrape-regional-grants]
  schedule = "0 4 * * *"

[[plugins]]
  package = "@netlify/plugin-nextjs"
