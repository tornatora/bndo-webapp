name: Chat Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
  schedule:
    - cron: '15 4 * * *'

jobs:
  chat-quality-gate:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      BNDO_BENCHMARK_BASELINE_MODEL: gpt-4.1
      BNDO_BENCHMARK_CASESET: extended
      BNDO_BENCHMARK_GATE: "true"
      BNDO_BENCHMARK_MIN_AVG: "0.985"
      BNDO_BENCHMARK_MIN_PASS: "0.95"
      BNDO_BENCHMARK_MIN_DELTA_AVG: "0"
      BNDO_BENCHMARK_MIN_DELTA_PASS: "0"
      BNDO_BENCHMARK_REQUIRE_NO_CRITICAL: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Assert OPENAI key present
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "Missing OPENAI_API_KEY secret. Cannot run chat quality gate."
            exit 1
          fi

      - name: Run P0 chat regressions
        run: npm run test:chat-p0

      - name: Run benchmark quality gate
        run: npm run benchmark:chat:gate

  chat-shadow-daily:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CHAT_NO_OPENAI_TOKENS: "true"
      BNDO_ADV_MAX_CASES: "1000"
      BNDO_ADV_CONCURRENCY: "2"
      BNDO_ADV_INCLUDE_BASELINE: "false"
      BNDO_ADV_GATE: "true"
      BNDO_ADV_MIN_PASS_RATE: "0.99"
      BNDO_ADV_MIN_AVG_SCORE: "0.99"
      BNDO_ADV_REQUIRE_NO_CRITICAL: "true"
      BNDO_ADV_MAX_INFRA_FAILURE_RATE: "0.2"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run daily shadow quality suite
        run: npx tsx scripts/chat-shadow-daily.ts
