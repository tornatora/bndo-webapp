[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

[functions.refresh-bandi]
  schedule = "0 3 * * *"

[functions.refresh-bandi-incremental]
  schedule = "0 15 * * *"

[functions.scrape-regional-grants]
  schedule = "0 4 * * *"
